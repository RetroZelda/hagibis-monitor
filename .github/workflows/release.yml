name: Build & Release

on:
  workflow_dispatch:
    inputs:
      # NOTE: this must stay the FIRST `default:` line in the file — the push
      # trigger below greps the first `default: 'X.Y.Z'` as the release version.
      version:
        description: 'Release version — omit the "v" prefix (e.g. 1.3.1). Check the previous tag shown in the first step if unsure. Version numbering should be "{major}.{minor}.{patch}" and follow semver principles. This will be used as the release tag and in the archive name, so choose carefully and sequentially!'
        required: true
        default: '1.3.1'
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # ── resolve version + skip decision once, on Linux ──────────────────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag:  ${{ steps.ver.outputs.tag }}
      skip: ${{ steps.ver.outputs.skip }}
    steps:
      - name: Restrict to authorized user
        if: github.actor != 'retrozelda'
        run: |
          echo "Only retrozelda can trigger this workflow. Actor was: ${{ github.actor }}"
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show last release tag
        run: |
          LAST=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | head -1 || true)
          if [ -z "$LAST" ]; then
            echo "No previous release tags found."
          else
            echo "Last release tag: $LAST"
          fi

      - name: Resolve version
        id: ver
        env:
          # Pass the untrusted dispatch input via env, never inline into the
          # script body, to avoid shell injection.
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="$INPUT_VERSION"
          else
            # Push trigger: read the version from the default: line in this file.
            # Keeps a single source of truth — bumping the default in a commit
            # is what cuts a release on push.
            RAW=$(grep -oP "default:\s*'\K[0-9]+\.[0-9]+\.[0-9]+" .github/workflows/release.yml | head -1)
            if [ -z "$RAW" ]; then
              echo "Could not parse version from release.yml default — aborting."
              exit 1
            fi
          fi
          RAW="${RAW#v}"   # strip leading v if user included it
          if ! printf '%s' "$RAW" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version '$RAW' is not in X.Y.Z form — aborting."
            exit 1
          fi
          TAG="v${RAW}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${TAG}"

          # Skip if this tag already exists — avoids re-releasing on every
          # push that didn't bump the version (e.g. README-only commits).
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin — nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  # ── build both platforms; a failure in either leg cancels the sibling ───────
  build:
    needs: resolve
    if: needs.resolve.outputs.skip != 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
          - os: windows-latest
            artifact: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libegl1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            upx-ucl

      - name: Install Python dependencies
        run: pip install pyinstaller -r requirements.txt

      - name: Build
        run: python -m PyInstaller hagibis-monitor.spec --clean --noconfirm

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          TAG="${{ needs.resolve.outputs.tag }}"
          ARCHIVE="hagibis-monitor-${TAG}-linux-x86_64.tar.gz"
          mkdir staging
          cp dist/hagibis-monitor hagibis-monitor.desktop install.sh staging/
          tar -czf "$ARCHIVE" -C staging .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          TAG="${{ needs.resolve.outputs.tag }}"
          ARCHIVE="hagibis-monitor-${TAG}-windows-x86_64.zip"
          # 7z is preinstalled on the runner and on PATH; Git Bash has no `zip`.
          7z a "$ARCHIVE" ./dist/hagibis-monitor.exe ./README.md

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: |
            *.tar.gz
            *.zip
          if-no-files-found: error

  # ── create the release only after BOTH builds succeed ──────────────────────
  release:
    needs: [resolve, build]
    if: needs.resolve.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # Create the tag here, atomically with the release, only after both
          # build legs have succeeded — so a build failure on either platform
          # can't leave a dangling tag that permanently wedges the version.
          tag_name: ${{ needs.resolve.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            *.tar.gz
            *.zip
          generate_release_notes: true
